<!-- Creates a style element; allows you to write CSS code -->
<style>
    .firstButton { /* This is called a CSS Selector; it tells the computer what elements to target */
        background-color: #0081ff; /* The text to the left is called a CSS Property, and to the right is the CSS Value */
        color: white; /* Changes text color */
        border: none; /* Decides whether it has a border or not */
        height: 30px;
        width: 200px;
        border-radius: 15px; /* Adds rounded corners */
        cursor: pointer; /* Changes mouse cursor */
        margin-right: 10px; /* Creates space around a button */
    }
    .secondButton {
        color: #0081ff;
        background-color: white;
        border-color: #0081ff;
        border-width: 3px;
        border-radius: 15px;
        height: 30px;
        border-style: solid;
        cursor: pointer;
        font-weight: bold; /* Makes the text bold */
        font-size: 15px;
    }
</style>

<button class="firstButton"> <!-- The class attribute creates a distinction between buttons  -->
    This is a button, with style!
</button>

<button class="secondButton">
    This is another button, with a different style!
</button>
